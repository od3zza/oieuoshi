name: Gerar Feed

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  gerar-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gerar lib/feed.xml
        run: python3 api/gerar_rss.py

      - name: Commit feed.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git diff --cached --quiet || git commit -m "chore: atualiza feed.xml [skip ci]"
          git push